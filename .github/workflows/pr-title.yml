name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Title: $TITLE"
          # Required: [MERGE] <source-branch> to <destination-branch>
          if [[ ! "$TITLE" =~ ^\[MERGE\][[:space:]].+[[:space:]]to[[:space:]].+$ ]]; then
            echo "::error::PR title must be: [MERGE] <source-branch> to <destination-branch>  (e.g. [MERGE] feature/scraper to main)"
            exit 1
          fi
